version: '3.8'

services:
  backend:
    build: .
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - sqlite_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/security_scanner.db
    networks:
      - scanner_network

  frontend:
    build: .
    command: streamlit run frontend/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    volumes:
      - .:/app
    networks:
      - scanner_network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - scanner_network

networks:
  scanner_network:
    driver: bridge

volumes:
  sqlite_data:
